<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dark Souls – Re-link the Fire · The Party</title>
<style>
  :root {
    --bg: #0d0b10;
    --bg2: #17131d;
    --card: #1c1722;
    --card-edge: #352b3f;
    --ember: #ff7a2f;
    --ember-soft: #ffb066;
    --text: #e8e0d0;
    --text-dim: #9a8fa5;
    --gold: #d9b64a;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, #2a1f33 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 110%, #331b10 0%, transparent 60%),
      var(--bg);
    color: var(--text);
    font-family: "Courier New", ui-monospace, monospace;
    min-height: 100%;
    overflow-x: hidden;
    padding-bottom: 60px;
  }
  /* subtle CRT scanlines */
  body::after {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0.00) 0px,
      rgba(0,0,0,0.00) 2px,
      rgba(0,0,0,0.10) 3px,
      rgba(0,0,0,0.00) 4px
    );
    z-index: 50;
  }
  header {
    text-align: center;
    padding: 48px 16px 8px;
    position: relative;
  }
  #bonfire {
    image-rendering: pixelated;
    width: 96px;
    height: auto;
    display: block;
    margin: 0 auto 10px;
    filter: drop-shadow(0 0 18px rgba(255,122,47,0.45));
  }
  h1 {
    font-size: clamp(20px, 4vw, 34px);
    letter-spacing: 0.28em;
    text-transform: uppercase;
    font-weight: bold;
    color: var(--text);
    text-shadow: 3px 3px 0 #000, 0 0 24px rgba(255,122,47,0.25);
  }
  .subtitle {
    margin-top: 10px;
    letter-spacing: 0.5em;
    text-transform: uppercase;
    font-size: 12px;
    color: var(--ember-soft);
    text-shadow: 2px 2px 0 #000;
  }
  .rule {
    width: min(560px, 80%);
    height: 2px;
    margin: 26px auto 0;
    background: linear-gradient(to right, transparent, var(--card-edge) 20%, var(--gold) 50%, var(--card-edge) 80%, transparent);
  }
  main {
    max-width: 1080px;
    margin: 34px auto 0;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 26px;
  }
  .card {
    background: linear-gradient(to bottom, #221b2b, var(--card) 40%, #151019);
    border: 2px solid var(--card-edge);
    box-shadow: 0 0 0 2px #000, 0 10px 30px rgba(0,0,0,0.6);
    padding: 22px 16px 18px;
    text-align: center;
    position: relative;
    transition: transform 0.15s ease, border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover {
    transform: translateY(-4px);
    border-color: var(--ember);
    box-shadow: 0 0 0 2px #000, 0 14px 34px rgba(0,0,0,0.7), 0 0 26px rgba(255,122,47,0.18);
  }
  .card canvas {
    image-rendering: pixelated;
    width: 168px;
    height: auto;
    display: block;
    margin: 0 auto;
  }
  .nameplate {
    margin-top: 14px;
    padding: 8px 10px 7px;
    background: #0e0b12;
    border: 2px solid var(--card-edge);
    box-shadow: inset 0 0 0 2px #000;
  }
  .char-name {
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    text-shadow: 2px 2px 0 #000;
    line-height: 1.35;
  }
  .char-name s {
    color: var(--text-dim);
    text-decoration-color: var(--ember);
  }
  .char-class {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text);
    letter-spacing: 0.05em;
  }
  .char-meta {
    margin-top: 5px;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  footer {
    text-align: center;
    margin-top: 64px;
    padding-bottom: 72px;
    font-size: 16px;
    font-weight: bold;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ember-soft);
    text-shadow: 2px 2px 0 #000, 0 0 18px rgba(255,122,47,0.35);
  }
  #splash {
    position: fixed;
    inset: 0;
    z-index: 100;
    background:
      radial-gradient(ellipse 70% 45% at 50% 60%, #1c1420 0%, transparent 70%),
      var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 34px;
    transition: opacity 1s ease;
  }
  #splash.fade {
    opacity: 0;
    pointer-events: none;
  }
  #splash canvas {
    image-rendering: pixelated;
    width: 144px;
    height: auto;
    filter: drop-shadow(0 0 18px rgba(255,122,47,0.0));
    transition: filter 0.6s ease;
  }
  #splash.lit canvas {
    filter: drop-shadow(0 0 22px rgba(255,122,47,0.55));
  }
  #relink-btn {
    background: #0e0b12;
    border: 2px solid var(--card-edge);
    box-shadow: 0 0 0 2px #000;
    color: var(--ember-soft);
    font-family: inherit;
    font-size: 15px;
    font-weight: bold;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    padding: 16px 26px;
    cursor: pointer;
    animation: btnPulse 2.2s ease-in-out infinite;
  }
  #relink-btn:hover {
    border-color: var(--ember);
    color: var(--text);
  }
  @keyframes btnPulse {
    0%, 100% { text-shadow: 0 0 0 rgba(255,176,102,0); }
    50%      { text-shadow: 0 0 14px rgba(255,176,102,0.75); }
  }
  body.pre .card {
    opacity: 0;
  }
  .card.reveal {
    animation: cardIn 0.55s ease backwards;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  #bgm-toggle {
    position: fixed;
    top: 14px;
    right: 14px;
    z-index: 60;
    background: #0e0b12;
    border: 2px solid var(--card-edge);
    box-shadow: 0 0 0 2px #000;
    color: var(--ember-soft);
    font-family: inherit;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 8px 11px;
    cursor: pointer;
  }
  #bgm-toggle:hover {
    border-color: var(--ember);
    color: var(--text);
  }
  .ember-particle {
    position: fixed;
    bottom: -10px;
    width: 3px;
    height: 3px;
    background: var(--ember);
    box-shadow: 0 0 6px 1px rgba(255,122,47,0.8);
    border-radius: 0;
    pointer-events: none;
    animation: floatUp linear infinite;
    z-index: 40;
  }
  @keyframes floatUp {
    0%   { transform: translate(0, 0); opacity: 0; }
    8%   { opacity: 0.9; }
    60%  { opacity: 0.7; }
    100% { transform: translate(var(--driftX), -105vh); opacity: 0; }
  }
</style>
</head>
<body>

<audio id="bgm" src="firelink-shrine.m4a" loop preload="auto"></audio>
<button id="bgm-toggle" aria-label="Toggle music">♪ Sound off</button>

<div id="splash">
  <canvas id="splash-bonfire" width="24" height="24" aria-hidden="true"></canvas>
  <button id="relink-btn">Press to re-link the fire</button>
</div>

<main id="party"></main>

// ---------------------------------------------------------------------------
// Renderer
// ---------------------------------------------------------------------------
const W = 24, H = 30;

function drawGrid(ctx, grid, palette, yOffsets) {
  for (let y = 0; y < grid.length; y++) {
    const row = grid[y];
    const dy = yOffsets ? yOffsets(y) : 0;
    for (let x = 0; x < row.length && x < W; x++) {
      const key = row[x];
      if (key === ".") continue;
      const color = palette[key];
      if (!color) continue;
      ctx.fillStyle = color;
      ctx.fillRect(x, y + dy, 1, 1);
    }
  }
}

function renderCharacter(canvas, ch, frame) {
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, W, H);
  // ground shadow
  ctx.fillStyle = "rgba(0,0,0,0.45)";
  ctx.fillRect(7, 27, 10, 1);
  ctx.fillRect(9, 28, 6, 1);
  // idle bob: on frame 1, everything above the hips shifts down one pixel
  const offsets = frame === 1
    ? (y) => (y < ch.hipRow ? 1 : 0)
    : null;
  drawGrid(ctx, ch.grid, ch.palette, offsets);
}

function renderBonfire(canvas, frame) {
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, 24, 24);
  drawGrid(ctx, BONFIRE_FRAMES[frame], BONFIRE_PAL, null);
}

  card.className = "card";

  const canvas = document.createElement("canvas");
  canvas.width = W;
  canvas.height = H;
  canvas.setAttribute("aria-label", ch.name.replace(/<[^>]+>/g, ""));
  card.appendChild(canvas);

  const plate = document.createElement("div");
  plate.className = "nameplate";
  plate.innerHTML =
    `<div class="char-name">${ch.name}</div>` +
    `<div class="char-class">${ch.klass}</div>` +
    `<div class="char-meta">Lvl 8 · Human · ${ch.player}</div>`;
  card.appendChild(plate);

  main.appendChild(card);
  charCanvases.push({ canvas, ch });
}

const bonfireCanvas = document.getElementById("bonfire");
let frame = 0;
function tick() {
  for (const { canvas, ch } of charCanvases) renderCharacter(canvas, ch, frame);
  renderBonfire(bonfireCanvas, frame);
  frame = 1 - frame;
}
tick();
setInterval(tick, 480);

// background music: attempt autoplay, fall back to first interaction,
// and give the visitor a mute toggle
const bgm = document.getElementById("bgm");
const bgmToggle = document.getElementById("bgm-toggle");
bgm.volume = 0.45;

function updateBgmLabel() {
  bgmToggle.textContent = bgm.paused ? "♪ Sound off" : "♪ Sound on";
}
bgm.addEventListener("play", updateBgmLabel);
bgm.addEventListener("pause", updateBgmLabel);
async function tryPlayBgm() {
  try { await bgm.play(); } catch (e) { /* autoplay blocked until interaction */ }
  updateBgmLabel();
}
bgmToggle.addEventListener("click", (e) => {
  e.stopPropagation();
  if (bgm.paused) { tryPlayBgm(); } else { bgm.pause(); updateBgmLabel(); }
});
// mobile browsers only allow audio to start from a completed gesture
// (pointerup/keydown), and only once a play() attempt succeeds do we
// stop listening
const bgmKickstart = async () => {
  if (!bgm.paused) return;
  try {
    await bgm.play();
    window.removeEventListener("pointerup", bgmKickstart);
    window.removeEventListener("keydown", bgmKickstart);
  } catch (e) { /* still blocked — keep listening */ }
  updateBgmLabel();
};
window.addEventListener("pointerup", bgmKickstart);
window.addEventListener("keydown", bgmKickstart);

// ---------------------------------------------------------------------------
// Title screen: an unlit bonfire until the fire is re-linked
// ---------------------------------------------------------------------------
const splash = document.getElementById("splash");
const splashBonfire = document.getElementById("splash-bonfire");
const relinkBtn = document.getElementById("relink-btn");

// omitting the flame/ember colors leaves just the coiled sword and coals
const UNLIT_PAL = { K: BONFIRE_PAL.K, S: BONFIRE_PAL.S, s: BONFIRE_PAL.s,
                    h: BONFIRE_PAL.h, C: BONFIRE_PAL.C };
drawGrid(splashBonfire.getContext("2d"), BONFIRE_FRAMES[0], UNLIT_PAL, null);

document.body.classList.add("pre");
document.body.style.overflow = "hidden";

relinkBtn.addEventListener("click", () => {
  relinkBtn.disabled = true;
  tryPlayBgm();
  // light the fire
  splash.classList.add("lit");
  renderBonfire(splashBonfire, 0);
  const splashFlicker = setInterval(
    () => renderBonfire(splashBonfire, Math.random() < 0.5 ? 0 : 1), 240);
  setTimeout(() => clearInterval(splashFlicker), 1900);
  // let it burn for a beat, then fade through to the party
  setTimeout(() => {
    splash.classList.add("fade");
    document.body.classList.remove("pre");
    document.body.style.overflow = "";
    document.querySelectorAll("main .card").forEach((card, i) => {
      card.style.animationDelay = (i * 110) + "ms";
      card.classList.add("reveal");
    });
  }, 700);
  setTimeout(() => splash.remove(), 1900);
});

// floating embers
for (let i = 0; i < 14; i++) {
  const e = document.createElement("div");
  e.className = "ember-particle";
  e.style.left = Math.random() * 100 + "vw";
  e.style.setProperty("--driftX", (Math.random() * 120 - 60) + "px");
  e.style.animationDuration = 6 + Math.random() * 9 + "s";
  e.style.animationDelay = -Math.random() * 12 + "s";
  document.body.appendChild(e);
}
</script>
</body>
</html>
